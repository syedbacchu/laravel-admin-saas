services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        uid: 1000
    container_name: laravel_saas_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    networks:
      - laravel_saas

  nginx:
    image: nginx:1.27-alpine
    container_name: laravel_saas_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel_saas

  mysql:
    image: mysql:8.0
    container_name: laravel_saas_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_admin_saas
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    command:
      - --default-authentication-plugin=mysql_native_password
      - --sql_mode=
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_saas

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: laravel_saas_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - laravel_saas

  node:
    image: node:20-alpine
    container_name: laravel_saas_node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "tail -f /dev/null"
    networks:
      - laravel_saas

volumes:
  mysql_data:

networks:
  laravel_saas:
    driver: bridge
